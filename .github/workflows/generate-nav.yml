name: Generate Navigation Structure

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'generate-nav.py'
      - '.github/workflows/generate-nav.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate navigation structure
        run: python generate-nav.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet assets/nav-structure.json; then
            echo "✅ Navigation structure is up to date"
          else
            echo "📝 Navigation structure changed, committing..."
            git add assets/nav-structure.json
            git commit -m "chore: auto-update navigation structure [skip ci]"
            git push
          fi
